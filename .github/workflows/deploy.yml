name: Build and Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_BACKEND: ${{ secrets.DOCKER_USERNAME }}/sg-exercise-backend
  IMAGE_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/sg-exercise-frontend
  RESOURCE_GROUP: sg-exercise-rg
  ENVIRONMENT: sg-exercise-env

jobs:
  build-and-push:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:${{ github.sha }},${{ env.IMAGE_BACKEND }}:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:${{ github.sha }},${{ env.IMAGE_FRONTEND }}:latest

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install containerapp extension
        run: az extension add --name containerapp --upgrade -y

      - name: Deploy backend
        run: |
          az containerapp create \
            --name sg-backend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --environment ${{ env.ENVIRONMENT }} \
            --image ${{ env.IMAGE_BACKEND }}:${{ github.sha }} \
            --target-port 8000 \
            --ingress external \
            --env-vars APP_MESSAGE="${{ secrets.APP_MESSAGE }}" \
            --min-replicas 1 \
            --max-replicas 5 \
            || az containerapp update \
            --name sg-backend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_BACKEND }}:${{ github.sha }} \
            --set-env-vars APP_MESSAGE="${{ secrets.APP_MESSAGE }}"

      - name: Deploy frontend
        run: |
          az containerapp create \
            --name sg-frontend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --environment ${{ env.ENVIRONMENT }} \
            --image ${{ env.IMAGE_FRONTEND }}:${{ github.sha }} \
            --target-port 80 \
            --ingress external \
            --min-replicas 1 \
            --max-replicas 3 \
            || az containerapp update \
            --name sg-frontend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

      - name: Get frontend URL
        run: |
          URL=$(az containerapp show \
            --name sg-frontend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "App deployed at: https://$URL"