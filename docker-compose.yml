services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - APP_MESSAGE=${APP_MESSAGE:-Hello from local!}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy